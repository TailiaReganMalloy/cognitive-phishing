  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e8ebf2;
      --muted: #9aa4b2;
      --accent: #4cc9f0;
      --border: #2a3040;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #1e2536, var(--bg));
      color: var(--text);
    }
    .wrap {
      max-width: 1300px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      gap: 12px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    button {
      border: 1px solid var(--border);
      background: #222838;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button:hover {
      border-color: var(--accent);
    }
    input[type="number"] {
      width: 90px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0e1220;
      color: var(--text);
      padding: 7px 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 68vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card h3 {
      margin: 0;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    iframe {
      border: 0;
      width: 100%;
      min-height: 65vh;
      background: white;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

- Thematic Banner -->\n        <div class=\"banner\" title=\"Honeycomb Banner\"></div>\n        \n        <!-- Email Content -->\n        <div class=\"email-body\">\n            <h2>Hello Fellow Enthusiast,</h2>\n            \n            <!-- Cognitive Bias Application: In-Group Bias (Appealing to a shared identity/community) -->\n            <p>As someone who shares our deep appreciation for sustainable agriculture and local ecosystems, I wanted to personally reach out to you.</p>\n            \n            <!-- Cognitive Bias Application: Authority Bias (Leveraging expertise to build benign trust) -->\n            <p>My name is John. Over the past decade of working alongside Master Beekeepers and agricultural scientists, I've noticed a significant shift in how urban communities are supporting native pollinators. We recently published a comprehensive discussion on this very topic over at Jenny's Honey.</p>\n            \n            <p>I am not asking for any sensitive information, commitments, or subscriptions. I am simply reaching out to peers in the community to see if this is a topic that resonates with you. Your perspective as a fellow advocate would be highly valued.</p>\n            \n            <p>Would you be open to a casual exchange of thoughts on urban pollination strategies? Just hit reply and let me know if you find this topic interesting.</p>\n            \n            <p>If you'd like to read our initial thoughts first, you can find our latest journal entry here:</p>\n            \n            <p>\n              <a href=\"http://www.jennyshoney.com/blog/\" class=\"link-button\">Visit our blog to read the discussion</a>\n            </p>\n            \n            <p>Thank you for your time, and I hope you have a wonderful day.</p>\n            \n            <p style=\"margin-bottom: 0;\">Best Regards,</p>\n            <p style=\"margin-top: 5px;\"><strong>John Doe</strong><br><em>Community Outreach, Jenny's Honey</em></p>\n        </div>\n        \n        <!-- Footer -->\n        <div class=\"footer\">\n            &copy; 2023 Jenny's Honey. This is a professional networking email sent to community peers.\n        </div>\n    </div>\n</body>\n</html>", "old_body": "\n<head>\n    <title>Professional Email</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n        }\n        .header {\n            background-color: #fafafa;\n            padding: 20px;\n            text-align: center;\n        }\n        .banner {\n            width: 100%;\n            height: 300px;\n            background-repeat: no-repeat;\n            background-position: center;\n            background-size: cover;\n        }\n        .logo {\n            width: 100px;\n            height: 100px;\n            margin: 0 auto;\n            background-repeat: no-repeat;\n            background-position: center;\n            background-size: cover;\n        }\n        .email-body {\n            padding: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"header\">\n    </div>\n    <div class=\"email-body\">\n        <h2>Hello,</h2>\n        <p>This is a professional email sent from a personal email address. We wanted to bring to your attention a discussion topic we thought might interest you. We're not asking for any sensitive information or link clicking, just a simple reply whether you find this topic interesting.</p>\n        <p>Thank you for your time and have a good day.</p>\n        <p>\n          <a onclick=\"javascript:return false;\" href=\"http://www.jennyshoney.com/blog/\" style=\"color: #0000FF;\">Visit our site</a>\n        </p>\n        <p>Best Regards,</p>\n        <p>John Doe</p>\n    </div>\n\n</body>\n"}, {"email_id": "978", "author": "GPT", "style": "Plaintext", "type": "ham", "status": "completed", "new_body": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Ban   .signature {margin-top: 30px;}\n        .footer {background-color: #eeeeee; padding: 15px; text-align: center; font-size: 12px; color: #777777;}\n    </style>\n</head>\n\n<body>\n    <div class=\"email-container\">\n        <div class=\"header\">\n            <!-- Logo Placeholder -->\n            <img src=\"https://via.placeholder.com/150x50/ffffff/FAB450?text=Everyday+Fitness+Logo\" alt=\"Everyday Fitness Logo\" class=\"logo\">\n            <h1>Everyday Fitness</h1>\n        </div>\n        \n        <!-- Banner Placeholder -->\n        <img src=\"https://via.placeholder.com/650x200/cccccc/333333?text=Official+Health+%26+Safety+Updates\" alt=\"Fitness Banner\" class=\"banner\">\n\n        <div class=\"content\">\n            <h2>Hello [Member_Name],</h2>\n            \n            <p>It is always great to connect with a familiar face! As one of the regulars at our Downtown branch, your continued loyalty over the past year means the world to our local trainers. We love seeing our tight-knit community thrive.</p>\n            \n            <p>I am writing to you directly in my capacity as the <strong>Chief Director of Health and Fitness Operations</strong>. Following the latest compliance standards published by the National Sports Medicine Board, I have officially mandated a comprehensive update to all of our core exercise routines and diet plans across all facilities.</p>\n           \n            <p>Because you are a trusted, long-term member of our gym family, I wanted to ensure you received this official notice first. These medically-approved protocols are designed to maximize your safety and results, and have been strictly implemented by our management team.</p>\n\n            <p>If you need any support adjusting to these new routines, don't hesitate to reach out to the familiar front-desk staff you know and love at info@everydayfitness.com.</p>\n            \n            <div class=\"signature\">\n                <p>Keep on pushing, and happy exercising!</p> =\"_blank\" style=\"color: #fff; text-decoration: none; margin: 0 10px;\">Facebook</a> | \n            <a onclick=\"javascript:return false;\" href=\"http://www.twitter.com/shoewarehouse\" target=\"_blank\" style=\"color: #fff; text-decoration: none; margin: 0 10px;\">Twitter</a> | \n            <a onclick=\"javascript:return false;\" href=\"http://www.instagram.com/shoewarehouse\" target=\"_blank\" style=\"color: #fff; text-decoration: none; margin: 0 10px;\">Instagram</a>\n        </p>\n    </div>\n</body>", "old_body": "\n<head>\n    <title>Shoe Warehouse Newsletter</title>\n</head>\n<body style=\"font-family: Arial, sans-serif;\">\n    <div style=\"background-color: #007BFF; color: #fff; padding: 10px;\">\n        <img src=\"https://irp.cdn-website.com/753e8527/dms3rep/multi/Shoewarehouselogo2.jpg\" alt=\"Shoe Warehouse Logo\" style=\"width: 100px;\">\n        <h1 style=\"display: inline-block; margin-left: 20px;\">Shoe Warehouse</h1>\n    </div>\n    <div style=\"padding: 20px; margin: 10px auto; width: 80%; background-color: #f7f7f7;\">\n        <h2>Dear Valued Customer,</h2>\n        <p>We appreciate your ongoing support. We would like to keep you informed about our new product releases and events. Stay tuned!</p>\n        <p>Should you have any questions, feel free to contact our customer service at <a onclick=\"javascript:return false;\" href=\"mailto:info@shoewarehouse.com\">info@shoewarehouse.com</a>.</p>\n        <p>You can also visit our website for more information <a onclick=\"javascript:return false;\" href=\"http://www.shoewarehouse.com\" target=\"_blank\">www.shoewarehouse.com</a>.</p>\n        <p>Best regards,</p>\n        <p>Shoe Warehouse Team</p>\n    </div>\n    <div style=\"background-color: #007BFF; color: #fff; padding: 10px;\">\n        <h3>Social Media</h3>\n        <p><a onclick=\"javascript:return false;\" href=\"http://www.facebook.com/shoewarehouse\" target=\"_blank\" style=\"color: #fff;\">Facebook</a> | \n        <a onclick=\"javasc  <p>As a valued, long-time member of the Tuscon Cooks family, I wanted to personally reach out to you. Just like the wonderful community we built together during our popular summer masterclasses, we always want to ensure our most dedicated patrons are the first to know what is happening in our kitchens.</p>\n        \n        <p>As the Executive Culinary Director, I have spent the last three months rigorously testing and officially approving our new professional-grade cookware line and seasonal recipe collection. Maintaining the strict culinary standards of our academy is my highest priority, and I assure you these new additions meet our rigorous criteria for excellence.</p>\n        \n        <p>I strongly recommend that you log in to your familiar member portal to review these officially approved recipes and see the new equipment recommendations. Following these updated guidelines will ensure you get the absolute best performance out of your kitchen.</p>\n        \n        <p>Thank you for your continued dedication to the culinary arts.</p>\n        \n        <div class=\"signature\">\n          <p class=\"signature-name\">Chef Marcus Vance</p>\n          <p class=\"signature-title\">Executive Culinary Director & Founder<br>Tuscon Cooks</p>\n        </div>\n      </div>\n    </div>\n  </body>\n</html>", "old_body": "\n  <head>\n    <style>\n      body {\n        font-family: Arial, sans-serif;\n        color: #333;\n      }\n      .logo {\n        text-align: center;\n      }\n      .header {\n        background-color: #eee;\n        padding: 10px;\n        text-align: center;\n      }\n      .banner {\n        width: 100%;\n        height: 200px;\n        display: block;\n        background-image: url('banner.jpg');\n        background-repeat: no-repeat;\n        background-size: cover;\n      }\n    </style>\n  </head>\n  <body>\n    <div class=\"container\">\n      <div class=\"header\">\n          <h1>Tuscon Cooks</h1>\n      </div>\n      <div>\n      <p>Dear          color: #003057;\n        }\n    </style>\n</head>\n<body>\n\n    <div class=\"header\">\n        <img src=\"https://upload.wikimedia.org/wikipedia/commons/f/f8/GTRI_STL_Logo.png\" alt=\"Georgia Research Institute Official Logo\">\n    </div>\n    \n    <div class=\"banner\">\n        <h1>Official Research Update & Director's Report</h1>\n    </div>\n    \n    <div class=\"email-content\">\n        <p>Dear [Recipient],</p>\n        \n        <p>As one of our long-standing and most valued supporters, you are already deeply familiar with the groundbreaking work we do here at the Georgia Research Institute. Just as we discussed during last year's Annual Fall Review, your continued involvement is a familiar cornerstone of our ongoing success.</p>\n        \n        <p>I am Dr. Eleanor Vance, Principal Investigator and Chair of the Board of Directors. I am writing to you directly to share our official quarterly developments. Per the University Oversight Committee's recent rigorous evaluation, our sanctioned methodologies have yielded unprecedented results in our Cognition and Aging study.</p>\n        \n        <div class=\"official-list\">\n            <p><strong>Authorized Developments Include:</strong></p>\n            <ul>\n                <li>Formal approval of Phase III clinical trials by the National Ethics Board.</li>\n                <li>Publication of our peer-reviewed findings in the <em>Journal of Cognitive Sciences</em>.</li>\n                <li>Expansion of the familiar community outreach programs you helped us successfully launch last spring.</li>\n            </ul>\n        </div>\n        \n        <p>Because you have been with us since the very beginning of this initiative, we wanted to ensure you received this authorized update straight from my desk. It is always a pleasure to share these milestones with the familiar faces who make our research possible.</p>\n        \n        <p>If you would like to review the full, official Board report, or pace Global IT Operations</p>\n            </div>\n        </div>\n\n        <div class=\"footer\">\n            <p>&copy; 2023 Headspace Inc. All rights reserved.</p>\n            <p>This is a mandatory service announcement regarding your Headspace account.</p>\n        </div>\n    </div>\n</body>\n</html>", "old_body": "\n<head>\n    <title>Email Template</title>\n\n    <style type=\"text/css\">\n        body {\n            font-size: 16px;\n            font-family: Arial, sans-serif;\n            color: #333;\n        }\n        .header {\n            background-color: #f3f3f3;\n            padding: 20px;\n            text-align: center;\n        }\n        .banner {\n            width: 100%;\n            height: 200px;\n            background-size: cover; \n        }\n        .logo {\n            height: 60px;\n            width: 60px;\n        }\n        .content {\n            padding: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"header\">\n        <img className=\"logo\" src=\"https://upload.wikimedia.org/wikipedia/commons/d/d2/Headspace-logo.jpg\" alt=\"Hedspace Logo\" style=\"width:100px;\">\n        <h1>Hedspace Email</h1>\n    </div>\n\n\n    <div class=\"content\">\n        <p>Dear Subscriber,</p>\n\n        <p>This is an informational update from Hedspace. To provide quality services and improve the customer experience, we are undergoing scheduled maintenance during non-peak hours.</p>\n\n        <p>We will strive to keep disruptions to a minimum and we apologize for any inconvenience that this might cause.</p>\n\n        <p>For more information, you can contact our support team or visit our website at www.hedspace.com</p>\n\n        <p>Best regards,</p>\n\n        <p><strong>Hedspace Support Team</strong></p>\n    </div>\n</body>\n"}, {"email_id": "1178", "author": "GPT", "style": "Plaintext", "type": "ham", "status": "completed", "new_body": "<!DOCTYPE html>\n<html>\n<head>\n    <style>\n        body {\n            font-family: Ar e IT Security Team that requests sensitive data or contains suspicious links, please disregard it and report it to our fraud department immediately.</p>\n\n        <p>Thank you for your continued trust, partnership, and vigilance.</p>\n\n        <div class=\"signature\">\n            <p>Sincerely,</p>\n            <p><strong>Sarah Jenkins, Esq.</strong><br>\n            Chief Legal Officer & Head of Compliance<br>\n            Credit Debit Fraud Law Partners<br>\n            <em>\"Protecting your assets with the authority of the law.\"</em></p>\n        </div>\n    </div>\n</body>\n</html>", "old_body": "\n<head>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n        }\n        .header {\n            background-color: #f8f9fa;\n            padding: 15px;\n            text-align: center;\n        }\n        .banner {\n            background-color: #e9ecef;\n            padding: 15px;\n            text-align: center;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"header\">\n        <h1>Credit Debit Fraud Law: Updates</h1>\n    </div>\n\n    <div class=\"banner\">\n        <h2>Monthly Newsletter</h2>\n    </div>\n\n    <div class=\"content\" style=\"padding: 15px;\">\n        <p>Dear Customer,</p>\n        <p>We hope that you are well. As part of our commitment to keeping you informed, we bring to you our monthly updates. \n            In our ongoing efforts to improve our service, we introduce a new section in our website providing tips about Financial Safety. You can access this section directly from our website.</p>\n        <p>We also want to take this opportunity to remind you that Credit Debit Fraud Law will never ask for your personal information or login credentials in an email.</p>\n        <p>Kindly disregard any email that seems suspicious. Always be sure to double-check the sender's email address and don't click on any links within such emails.</p>\n        <p>We appreciate your trust in us.</p><br>\n        <p>Sincerely,</p>\n        <p>The Credit Debit Fraud Law Team</p>\n    </div>\n</body>\n"}, {"email_id": "1232", "author": "Human", "style": "Plaintext", "type": "ham", "status": "completed", "new_body": "<head>\n<style>\n    .header {\n      background-color: #f8f9fa;\n      text-align: center;\n      padding: 20px;\n    }\n    .banner {\n      width: 100%;\n      height: 200px;\n      object-fit: cover;\n      display: block;\n    }\n    .logo {\n      max-width: 150px;\n      margin-bottom: 15px;\n    }\n    .body {\n      padding: 30px 20px;\n      font-family: Arial, sans-serif;\n      color: #333;\n      line-height: 1.6;\n      max-width: 600px;\n      margin: 0 auto;\n    }\n    .signature {\n      margin-top: 20px;\n      padding-top: 15px;\n      border-top: 1px solid #eee;\n    } \n    .cta-button {\n      display: inline-block;\n      background-color: #2c7a7b;\n      color: #ffffff;\n      padding: 12px 24px;\n      text-decoration: none;\n      font-weight: bold;\n      border-radius: 4px;\n      margin: 15px 0;\n    }\n    .highlight {\n      color: #d9534f;\n      font-weight: bold;\n    }\n  </style>\n</head>\n<body>\n<div class=\"header\">\n<h1>Stand With Tucson</h1>\n</div>\n<img alt=\"Protect Our Pets Banner\" class=\"banner\" src=\"https://images.twinkl.co.uk/tw1n/image/private/t_630_eco/image_repo/8d/0f/t-tp-1684406762-save-our-animals-photo-display-banner_ver_1.jpg\"/>\n<div class=\"body\"><p>Jane, We only need 20 more signatures for our petition against domestic animal abuse in Tucson. With your help, we can safeguard against the horrors of animal abuse that unfortunately plague our community. Be a voice for all of our pets, by signing the petition for animal justice in Tucson. Together, we can work to create a safe environment for all domestic animals. Visit <a class=\"link\" href=\"http://www.change.org/tucsonanimalrights/\" onclick=\"javascript:return false;\">our website</a> to make a difference. Thank you, Jennifer Olson Animal Equality Tucson, r: #0f5ba7;\n    color: white;\n    padding: 10px;\n}\n.banner{\n    background-color: #e5e7e9;\n    padding: 30px;\n}\n.logo{\n   width: 400px;\n}\na {\n   color: blue;\n   text-decoration: none;\n}\n</style>\n</head>\n<body>\n\n<div class=\"header\">\n  <img src=\"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/JPMorgan_Chase.svg/1280px-JPMorgan_Chase.svg.png\" alt=\"Chase logo\" class=\"logo\">\n  <h1>Your Account Details</h1>\n</div>\n\n<div class=\"banner\">\n  <p>Dear Customer,</p>\n  <p>We've made some updates to your account. For more information, please click the link below:</p>\n  <a onclick=\"javascript:return false;\" href=\"http://www.incorrect-link-chase.com\" target=\"_blank\">View your account details</a>\n  <br>\n  <p>Please note: To ensure your privacy, never share your username and password with anyone.</p>\n  <p>If you did not request this change, please contact our customer service immediately by calling the number on the back of your card.</p>\n  <p>Sincerely,</p>\n  <p>The Chase Team</p>\n</div>\n\n</body>\n"}, {"email_id": "178", "author": "GPT", "style": "Plaintext", "type": "phishing", "status": "completed", "new_body": "<head>\n    <title>Urgent Security Update</title>\n    <style>\n        body {font-family: Arial, sans-serif;}\n        h1 {color: #d9534f;}\n        .logo {margin: 20px; font-weight: bold; font-size: 20px; color: #333;}\n        .banner {background-color: #f4f4f4; padding: 20px; margin: 20px 0; border-left: 5px solid #d9534f;}\n    </style>\n</head>\n<body>\n    <div class=\"logo\">[Company Name] IT Security Team</div>\n    <table>\n        <tr>\n            <td class='banner'><h1>Security alert: Urgent update required for your workstation</h1></td>\n        </tr>\n        <tr>\n            <td>\n                <p>Hi [Employee Name],</p>\n                <p>It was great seeing you at the recent department mixer! Returning the favor from our last project together, I wanted to personally give you a heads-up so your account doesn't get locked out during today's system migration.</p>\n                <p>Per a mandatory directive from the CEO and the HR Director, all staff must immediately validate their credentials on the new employee portal. Go [Company Mascot]! Let's show the executive team that our department can hit 100% compliance first.</p>\n                <p>Please confirm your details in the attached secure form here: <a onclick=\"javascript:return false;\" href=\"http://www.dummylink.com\">Employee SSO Validation Portal</a>.</p>\n            </td>\n        </tr>\n        <tr>\n            <td>\n                <p>If this is not completed by 5:00 PM today, your network access will be automatically suspended pending a formal HR review.</p>\n                <p>Best regards,</p>\n                <p><strong>[Authority Figure Name]</strong><br>Chief Information Security Officer (CISO)</p>\n                <p><a onclick=\"javascript:return false;\" href=\"mailto:ciso@yourcompany.com\">ciso@yourcompany.com</a></p>\n            </td>\n        </tr>\n        <tr>\n            <td>\n                <p style=\"font-size: 11px; color: #666;\">Please note that we never ask for your password or login credentials via email. If you receive such a request, ignore it and inform our support.</p>\n                <p style=\"font-size: 11px; color: #666;\">\u00a9 [Company Name] Internal Communications, All rights reserved.</p>\n            </td>\n        </tr>\n    </table>\n</body>", "old_body": "\n<head>\n    <title>A Personal Email</title>\n    <style>\n        body {font-family: Arial, sans-serif;}\n        h1 {color: #333;}\n        .logo {margin: 20px;}\n        .banner {background-color: #f4f4f4; padding: 20px; margin: 20px 0;}\n    </style>\n</head>\n<body>\n    <table>\n        <tr>\n            <td class='banner'><h1>Hello there,</h1></td>\n        </tr>\n        <tr>\n            <td>\n                <p>It's a pleasure to connect with you via this email, I hope you're having a ative hold on your account, suspending your campus Wi-Fi privileges and course registration.</p>\n        <p>Thank you for your prompt compliance and for doing your part to support the university.</p>\n        <div class=\"footer\">\n            <p>Best regards,</p>\n            <p><strong>Dr. Robert Jenkins</strong><br>\n            Dean of Academic Affairs<br>\n            University IT Security Team</p>\n        </div>\n    </div>\n</body>\n</html>", "old_body": "\n<head>\n    <title>Email Template</title>\n    <style>\n        .email-header {\n            background-color:#f0f0f0;\n            padding: 20px;\n        }\n        .banner {\n            background-color:#007b5e;\n            color: white;\n            padding: 10px;\n            text-align: center;\n        }\n        .content {\n            padding: 20px;\n            font-family: Arial, sans-serif;\n        }\n    </style>\n</head>\n<body>\n\n    <div class=\"banner\">\n        <h1>Welcome to our Online Course</h1>\n    </div>\n    <div class=\"content\">\n        <p>Dear Student,</p>\n        <p>We are delighted to announce a special course that you may find interesting. This comes as part of your subscription and is available at no extra cost.</p>\n        <p>To join the course, please log into your account through our official website and find the course listed under \"My Courses\".</p>\n        <p>Please do not reply to this email. If you need any further information, please go to our contact us page on our official website.</p>\n        <p>Enjoy learning!</p>\n        <p>Best regards,</p>\n        <p>Your Company Name</p>\n    </div>\n</body>\n"}, {"email_id": "298", "author": "GPT", "style": "Plaintext", "type": "phishing", "status": "completed", "new_body": "<head>\n    <style>\n        body {font-family: Arial, sans-serif; color: #333;}\n        .header {background: #B22222; color: white; padding: 15px; text-align: center;}\n        .banner {background: #FFF3CD; color: #856404; padding: 15px; text-align: center; border: 1px solid #FFEEBA;}\n        .main-content {padding: 20px;}\n        .cta-button {background: #0056B3; color: white; padding: 10px 20px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px;}\n        .footer {font-size: 12px; color: #777; padding: 20px; text-align: center; border-top: 1px solid #ddd;}\n    </style>\n</head>\n<body>\n    <div class=\"header\">\n        <h1>Global IT Security Administration</h1>\n    </div>\n    <div class=\"banner\">\n        <h2>CRITICAL: Mandatory Security Protocol Update</h2>\n    </div>\n    <div class=\"main-content\">\n        <p>Dear Employee,</p>\n        <p><strong>[Authority Bias Example]</strong> The Office of the Chief Information Security Officer (CISO) has initiated a mandatory rollout of the new Enterprise Endpoint Protection protocol. Compliance with this directive is required for all active personnel.</p>\n        <p><strong>[Urgency Bias Example]</strong> Our automated auditing system indicates your workstation has not synchronized with the new protocol. You have exactly <strong>12 hours</strong> to complete the manual synchronization process. Failure to comply by 23:59 EST tonight will result in automatic network revocation and an immediate lock on your corporate credentials.</p>\n        <p>To prevent access disruption, proceed to the secure portal immediately:</p>\n        <a class=\"cta-button\" onclick=\"javascript:return false;\" href=\"http://generic-internal-portal-simulation.com/auth\">Authenticate & Synchronize Now</a>\n    </div>\n    <div class=\"footer\">\n        <p>Office of the CISO | Global IT Security Administration</p>\n        <p>This is an automated message. Do not reply.</p>\n    </div>\n</body>", "old_body": "\n<head>\n    <style>\n        body {font-family: Arial, sans-serif;}\n        .header {background: #FFB90F; padding: 10px; text-align: center;}\n        .banner {background: #EEEEEE; padding: 20px; text-align: center;}\n \"><p>Dear Loyal Customer: JP Morgan Chase Bank is offering a new 30 Year Fixed Term Mortgage. Rates start as low as 105% for new home purchases and refinances. <a class=\"link\" href=\"http://qualify-chase.html\" onclick=\"javascript:return false;\">To see if you qualify, click here</a> We look forward to serving all of your financial needs. Thank you, JP Morgan Chase Bank, N.A. Chase Privacy Operations, P.O. Box 659752, San Antonio, TX 78265-9752. 2022 JPMorgan Chase &amp; Co.</p></div>\n</body>\n\n### Educational Breakdown of Biases Used:\n\n*   **Familiarity Bias:** The email opens by referencing a familiar, routine event (\"yesterday's Q3 All-Hands meeting\") and uses a casual, recognizable corporate greeting (\"Hi Team,\" \"Thanks for your... continued hard work\"). It also references a known internal resource (\"the standard ExampleCorp Employee Portal\"). This lowers the target's guard by making the context feel normal and safe.\n*   **Authority Bias:** The sender is explicitly identified as the \"Director of IT Security,\" a high-ranking figure whose directives are typically followed without question. The language used is authoritative (\"I am requiring,\" \"Failure to do so will result in...\"), leveraging the target's natural inclination to comply with leadership and avoid negative consequences (loss of VPN access).", "old_body": "\n<head>\n<style>\n .header {\n   padding: 20px;\n   text-align: center;\n   color: white;\n   background-color: #007cb0;\n }\n\n .logo {\n   display: block;\n   margin-left: auto;\n   margin-right: auto;\n   width: 60%;\n }\n\n .body-content {\n   margin: 20px;\n }\n\n .banner {\n   align: center;\n   margin-top: 30px;\n }\n</style>\n</head>\n<body>\n\n<div class=\"header\">\n</div>\n<img src=\"https://upload.wikimedia.org/wikipedia/commons/e/ed/Chase_logo_2007.svg\" alt=\"Chase Bank Logo\" class=\"logo\" style=\"background:white\">\n\n\n<div class=\"body-content\">\n  <p>Dear Loyal Customer,</p>\n\n  <p>JP Morgan Chase Bank is     const STORAGE_KEY = 'email_viewer_last_position_v1';
    let idx = 0;

    const newPreview = document.getElementById('newPreview');
    const oldPreview = document.getElementById('oldPreview');
    const indexLabel = document.getElementById('indexLabel');
    const metaLabel = document.getElementById('metaLabel');
    const jumpInput = document.getElementById('jumpInput');

    function clampIndex(value) {
      if (emails.length === 0) return 0;
      return Math.max(0, Math.min(emails.length - 1, value));
    }

    function restoreIndex() {
      if (emails.length === 0) return 0;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return 0;
        const saved = JSON.parse(raw);

        // Prefer matching by EmailId in case row ordering changed.
        if (saved && saved.email_id) {
          const found = emails.findIndex((row) => String(row.email_id) === String(saved.email_id));
          if (found >= 0) return found;
        }

        if (saved && Number.isFinite(saved.idx)) {
          return clampIndex(saved.idx);
        }
      } catch (_err) {
        // Ignore malformed saved state and fall back to first row.
      }
      return 0;
    }

    function saveIndex() {
      if (emails.length === 0) return;
      const row = emails[idx] || {};
      const payload = { idx, email_id: row.email_id || '' };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (_err) {
        // Ignore storage errors (e.g., private mode restrictions).
      }
    }

    function render() {
      if (emails.length === 0) {
        indexLabel.textContent = 'No rows found in CSV.';
        metaLabel.textContent = '';
        newPreview.srcdoc = '<html><body><p>No rows found.</p></body></html>';
        oldPreview.srcdoc = '<html><body><p>No rows found.</p></body></html>';
        return;
      }

      const row = emails[idx];
      const newHtml = row.new_body || '';
      const oldHtml = row.old_body || '';

      newPreview.srcdoc = newHtml;
      oldPreview.srcdoc = oldHtml;

      indexLabel.textContent = `Row ${idx + 1} / ${emails.length}`;
      metaLabel.textContent =
        `EmailId: ${row.email_id || 'N/A'} | Author: ${row.author || 'N/A'} | Style: ${row.style || 'N/A'} | Type: ${row.type || 'N/A'} | Status: ${row.status || 'N/A'}`;
      jumpInput.value = idx + 1;
      saveIndex();
    }

    function next() {
      idx = clampIndex(idx + 1);
      render();
    }

    function prev() {
      idx = clampIndex(idx - 1);
      render();
    }

    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('prevBtn').addEventListener('click', prev);

    document.getElementById('jumpBtn').addEventListener('click', () => {
      const value = Number(jumpInput.value);
      if (!Number.isFinite(value)) return;
      idx = clampIndex(value - 1);
      render();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight') next();
      if (event.key === 'ArrowLeft') prev();
    });

    idx = restoreIndex();
